<ion-content [fullscreen]="true" class="login-content">
  <div class="login-bg">
    <div class="login-card">
      <img src="logo.png" alt="Pajer Casino" class="login-logo" />
      <h1 class="modak-regular login-brand">Pajer Casino</h1>
      <p class="login-subtitle">Create Your Account</p>

      <div class="login-form">
        <div class="input-group">
          <label class="input-label">Display Name</label>
          <input
            class="login-input"
            type="text"
            placeholder="Your name"
            [(ngModel)]="displayName"
            autocomplete="name"
          />
        </div>

        <div class="input-group">
          <label class="input-label">Email</label>
          <input
            class="login-input"
            type="email"
            placeholder="you@example.com"
            [(ngModel)]="email"
            autocomplete="email"
          />
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <input
            class="login-input"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="password"
            autocomplete="new-password"
          />
        </div>

        <div class="input-group">
          <label class="input-label">Confirm Password</label>
          <input
            class="login-input"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="confirmPassword"
            (keyup.enter)="signUpWithEmail()"
            autocomplete="new-password"
          />
        </div>

        @if (error) {
          <p class="login-error">{{ error }}</p>
        }

        <button
          class="btn-primary"
          [disabled]="loading"
          (click)="signUpWithEmail()"
        >
          {{ loading ? 'Creating account…' : 'Create Account' }}
        </button>

        <div class="divider"><span>or</span></div>

        <button
          class="btn-google"
          [disabled]="loading"
          (click)="signUpWithGoogle()"
        >
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <p class="login-footer">
          Already have an account?
          <button class="link-btn" (click)="goToLogin()">Sign In</button>
        </p>
      </div>
    </div>
  </div>
</ion-content>
